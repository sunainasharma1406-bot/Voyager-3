<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Voyager</title>
<meta name="theme-color" content="#050810">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="starfield"></canvas>
<div id="app">

  <div class="topbar">
    <div class="brand">
      <canvas id="plasmaOrb" width="72" height="72" class="plasma-orb"></canvas>
      <div>
        <div class="brand-name">VOYAGER</div>
        <div class="brand-sub">RAHUL'S COMPANION <span id="statusText">CHARGED</span></div>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" id="speakToggleBtn" title="Toggle voice replies">🔇</button>
      <button class="icon-btn" id="settingsBtn" title="Settings">⚙</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="chat">TRANSMISSION</button>
    <button class="tab" data-tab="obj">OBJECTIVES</button>
    <div class="tab-indicator" id="tabIndicator"></div>
  </div>

  <div class="panel active" id="panel-chat">
    <div class="log" id="log">
      <div class="msg-empty" id="emptyMsg">// no signal yet — say something to start //</div>
    </div>
    <div id="imagePreviewBar" class="image-preview-bar"></div>
    <div class="composer">
      <button class="icon-btn composer-btn" id="attachBtn" title="Attach image">📎</button>
      <input type="file" id="fileInput" accept="image/*" style="display:none" />
      <input type="text" id="chatInput" placeholder="type your message..." />
      <button class="icon-btn composer-btn" id="micBtn" title="Voice input">🎤</button>
      <button class="send-btn" id="sendBtn">SEND</button>
    </div>
  </div>

  <div class="panel" id="panel-obj">
    <div class="obj-body">
      <div class="obj-add">
        <input type="text" id="objInput" placeholder="add an objective / reminder..." />
        <button id="objAddBtn">ADD</button>
      </div>
      <div id="objList"></div>
    </div>
  </div>

</div>

<div class="modal-backdrop" id="settingsModal">
  <div class="modal">
    <h3>GEMINI API KEY</h3>
    <p>Voyager needs a free Gemini API key to think. Get one at
      <strong>aistudio.google.com/apikey</strong> (no credit card needed), then paste it below.
      It's stored only in this browser, never sent anywhere except Google.</p>
    <input type="password" id="apiKeyInput" placeholder="AIza..." />
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelSettings">CANCEL</button>
      <button class="btn-save" id="saveSettings">SAVE</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
